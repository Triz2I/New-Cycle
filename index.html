<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Cycle - Loja Oficial</title>

<style>
:root{
  --lilas:#c8a2ff;
  --lilas2:#a97cff;
  --lilasEscuro:#6d39d8;
}

body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  background:white;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
  background:linear-gradient(90deg,#efe9ff,#ffffff);
  box-shadow:0 2px 15px rgba(0,0,0,0.08);
  position:sticky;
  top:0;
  z-index:999;
}

#mainLogo{
  height:90px;
}

nav{
  display:flex;
  align-items:center;
  gap:25px;
}

nav a{
  text-decoration:none;
  color:#555;
  font-weight:600;
  transition:.3s;
}

nav a:hover{
  color:var(--lilas2);
}

/* CARRINHO */
.cart-icon{
  cursor:pointer;
  position:relative;
  font-weight:bold;
}

.cart-count{
  position:absolute;
  top:-8px;
  right:-12px;
  background:var(--lilasEscuro);
  color:white;
  font-size:12px;
  padding:3px 7px;
  border-radius:50%;
}

/* HERO */
.hero{
  background:linear-gradient(90deg,var(--lilas),white);
  padding:100px 40px;
}

.hero h1{
  font-size:42px;
}

/* PRODUTOS */
.products{
  padding:60px 40px;
}

.grid{
  display:flex;
  gap:30px;
  flex-wrap:wrap;
}

.card{
  width:250px;
  background:white;
  border-radius:18px;
  padding:15px;
  box-shadow:0 8px 25px rgba(0,0,0,.08);
  text-align:center;
  transition:.3s;
}

.card:hover{
  transform:translateY(-8px);
}

.card img{
  width:100%;
  border-radius:12px;
}

.card button{
  background:var(--lilas2);
  border:none;
  color:white;
  padding:10px 18px;
  border-radius:10px;
  cursor:pointer;
  transition:.3s;
}

.card button:hover{
  transform:scale(1.05);
}

/* MODAL CARRINHO */
.cart-modal{
  position:fixed;
  right:-400px;
  top:0;
  width:350px;
  height:100%;
  background:white;
  box-shadow:-5px 0 25px rgba(0,0,0,.2);
  padding:25px;
  transition:.4s;
  z-index:1000;
  overflow:auto;
}

.cart-modal.active{
  right:0;
}

.cart-item{
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
  border-bottom:1px solid #eee;
  padding-bottom:10px;
}

.cart-item button{
  background:red;
  color:white;
  border:none;
  padding:3px 8px;
  border-radius:6px;
  cursor:pointer;
}

.total{
  font-weight:bold;
  margin-top:20px;
  font-size:18px;
}

/* NOTIFICAÇÃO */
.toast{
  position:fixed;
  bottom:30px;
  right:30px;
  background:var(--lilasEscuro);
  color:white;
  padding:15px 20px;
  border-radius:10px;
  opacity:0;
  transition:.4s;
}

.toast.show{
  opacity:1;
}

/* RESPONSIVO */
@media(max-width:800px){
  .grid{justify-content:center}
}
</style>
</head>

<body>

<header>
<img src="img/logodanc.png" id="mainLogo">

<nav>
<a href="#">Início</a>
<a href="#prod">Produtos</a>
<div class="cart-icon" onclick="toggleCart()">
🛒 Carrinho
<span class="cart-count" id="cartCount">0</span>
</div>
</nav>
</header>

<section class="hero">
<h1>Beleza que inspira confiança</h1>
<p>Cosméticos premium da New Cycle.</p>
</section>

<section id="prod" class="products">
<h2>Produtos</h2>

<div class="grid">

<div class="card">
<img src="https://via.placeholder.com/250">
<h4>Creme NC</h4>
<p>R$ 39.90</p>
<button onclick="addToCart('Creme NC',39.90)">Comprar</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/250">
<h4>Perfume NC</h4>
<p>R$ 79.90</p>
<button onclick="addToCart('Perfume NC',79.90)">Comprar</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/250">
<h4>Perfume Floral NC</h4>
<p>R$ 129.90</p>
<button onclick="addToCart('Perfume Floral NC',129.90)">Comprar</button>
</div>

</div>
</section>

<!-- MODAL -->
<div class="cart-modal" id="cartModal">
<h2>Seu Carrinho</h2>
<div id="cartItems"></div>
<div class="total" id="cartTotal">Total: R$ 0</div>
</div>

<div class="toast" id="toast">Produto adicionado!</div>

<script>
let cart=[];
function addToCart(name,price){
  cart.push({name,price});
  updateCart();
  showToast();
}

function updateCart(){
  const cartItems=document.getElementById('cartItems');
  const cartCount=document.getElementById('cartCount');
  const cartTotal=document.getElementById('cartTotal');

  cartItems.innerHTML='';
  let total=0;

  cart.forEach((item,index)=>{
    total+=item.price;
    cartItems.innerHTML+=`
      <div class="cart-item">
        <span>${item.name}</span>
        <span>R$ ${item.price.toFixed(2)}
        <button onclick="removeItem(${index})">x</button>
        </span>
      </div>
    `;
  });

  cartCount.innerText=cart.length;
  cartTotal.innerText="Total: R$ "+total.toFixed(2);
}

function removeItem(index){
  cart.splice(index,1);
  updateCart();
}

function toggleCart(){
  document.getElementById('cartModal').classList.toggle('active');
}

function showToast(){
  const toast=document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),2000);
}
</script>

</body>
</html>
